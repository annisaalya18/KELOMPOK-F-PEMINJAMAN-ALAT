<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Peminjaman Alat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
    <h1 class="text-3xl font-bold text-slate-900 text-center">Masuk ke Sistem</h1>
    <p class="mt-3 text-slate-600 text-center">Gunakan akun admin atau user untuk masuk.</p>

    <form id="loginForm" class="mt-8 space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700">Email</label>
        <input id="email" type="email" required class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="admin@peminjaman.test" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Password</label>
        <input id="password" type="password" required class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="admin123" />
      </div>
      <button type="submit" class="w-full inline-flex justify-center rounded-xl bg-indigo-600 px-4 py-3 text-white font-semibold shadow hover:bg-indigo-700">Masuk</button>
      <p id="message" class="text-sm text-red-600"></p>
    </form>

    <div class="mt-6 text-sm text-slate-500 bg-slate-100 rounded-2xl p-4">
      <p><strong>Admin:</strong> admin@peminjaman.test / admin123</p>
      <p><strong>User:</strong> user@peminjaman.test / user123</p>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const message = document.getElementById('message');
      if (window.location.protocol === 'file:') {
        message.textContent = 'Silakan buka halaman lewat http://localhost:3000/ bukan langsung file lokal.';
        return;
      }

      try {
        const res = await fetch('/api/session');
        if (res.ok) {
          const { user } = await res.json();
          window.location.href = user.role === 'ADMIN' ? '/admin' : '/user';
        }
      } catch (error) {
        // Browser tidak terhubung ke server, tetap di halaman login
      }
    });

    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (!response.ok) {
          message.textContent = data.error || 'Gagal masuk. Coba lagi.';
          return;
        }
        window.location.href = data.role === 'ADMIN' ? '/admin' : '/user';
      } catch (error) {
        message.textContent = 'Tidak dapat terhubung ke server. Pastikan server dijalankan di http://localhost:3000';
        console.error(error);
      }
    });
  </script>
</body>
</html>

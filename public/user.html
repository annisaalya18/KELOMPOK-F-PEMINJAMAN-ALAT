<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard User - Peminjaman Alat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="mx-auto max-w-7xl px-4 py-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-2xl font-semibold text-slate-900">Dashboard Peminjam</h1>
        <p class="mt-2 inline-flex items-center rounded-full bg-blue-100 px-3 py-1 text-sm font-medium text-blue-800">Role: Peminjam</p>
        <p class="mt-3 text-sm text-slate-600">Kelola peminjaman dan lihat riwayat Anda.</p>
      </div>
      <button id="logoutBtn" class="rounded-xl bg-rose-500 px-4 py-2 text-white hover:bg-rose-600">Keluar</button>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6 space-y-6">
    <section class="grid gap-4 lg:grid-cols-3">
      <article class="rounded-3xl bg-white p-6 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-900">Status Peminjaman Saat Ini</h2>
        <div id="currentBorrowings" class="mt-4 space-y-3"></div>
      </article>
      <article class="rounded-3xl bg-white p-6 shadow-sm lg:col-span-2">
        <h2 class="text-lg font-semibold text-slate-900">Jadwal Tersedia</h2>
        <div id="scheduleList" class="mt-4 space-y-3"></div>
      </article>
    </section>

    <section class="grid gap-4 lg:grid-cols-2">
      <article class="rounded-3xl bg-white p-6 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-900">Riwayat Singkat</h2>
        <div id="recentHistory" class="mt-4 space-y-3"></div>
      </article>
      <article class="rounded-3xl bg-white p-6 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-900">Lapor Kendala</h2>
        <form id="reportForm" class="space-y-4">
          <label class="block text-sm font-medium text-slate-700">Pilih Peminjaman</label>
          <select id="reportPeminjaman" class="w-full rounded-xl border-gray-300 p-3 shadow-sm" required></select>
          <label class="block text-sm font-medium text-slate-700">Pesan Kendala</label>
          <textarea id="reportMessage" rows="4" class="w-full rounded-xl border-gray-300 p-3 shadow-sm" placeholder="Jelaskan masalah Anda" required></textarea>
          <button type="submit" class="rounded-xl bg-indigo-600 px-5 py-3 text-white hover:bg-indigo-700">Kirim Laporan</button>
          <p id="reportStatus" class="text-sm text-rose-600"></p>
        </form>
      </article>
    </section>

    <section class="rounded-3xl bg-white p-6 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900">Semua Riwayat Peminjaman</h2>
      <div id="historyTable" class="mt-4 overflow-auto"></div>
    </section>
  </main>

  <script>
    const currentBorrowingsContainer = document.getElementById('currentBorrowings');
    const scheduleList = document.getElementById('scheduleList');
    const recentHistoryContainer = document.getElementById('recentHistory');
    const historyTable = document.getElementById('historyTable');
    const reportForm = document.getElementById('reportForm');
    const reportPeminjaman = document.getElementById('reportPeminjaman');
    const reportMessage = document.getElementById('reportMessage');
    const reportStatus = document.getElementById('reportStatus');
    const logoutBtn = document.getElementById('logoutBtn');

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    async function loadDashboard() {
      const response = await fetch('/api/user/dashboard');
      if (response.status === 401) {
        window.location.href = '/login';
        return;
      }
      const data = await response.json();
      renderCurrentBorrowings(data.currentBorrowings);
      renderSchedule(data.activeSchedule);
      renderRecentHistory(data.recentHistory);
      populateReportOptions(data.currentBorrowings);
      loadHistoryFull();
    }

    async function loadHistoryFull() {
      const response = await fetch('/api/user/history');
      const data = await response.json();
      renderHistoryTable(data.history);
    }

    function renderCurrentBorrowings(items) {
      currentBorrowingsContainer.innerHTML = items.length ? items.map(item => `
        <div class="rounded-3xl border border-slate-200 p-4 bg-slate-50">
          <div class="flex items-center justify-between gap-4">
            <div>
              <h3 class="font-semibold text-slate-900">${item.alat.nama}</h3>
              <p class="text-sm text-slate-600">${item.jadwal.lokasi} • ${new Date(item.jadwal.tanggal).toLocaleDateString()} ${item.jadwal.sesi}</p>
            </div>
            <span class="rounded-full bg-amber-100 px-3 py-1 text-sm font-semibold text-amber-700">AKTIF</span>
          </div>
          <p class="mt-3 text-sm text-slate-700">Bukti pinjam: ${item.buktiPinjam || '-'}</p>
          <p class="mt-1 text-sm text-slate-700">Catatan: ${item.catatanPinjam || '-'}</p>
        </div>
      `).join('') : '<p class="text-slate-600">Tidak ada peminjaman aktif saat ini.</p>';
    }

    function renderSchedule(items) {
      scheduleList.innerHTML = items.length ? items.map(item => `
        <div class="rounded-3xl border border-slate-200 p-4 bg-slate-50">
          <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <h3 class="font-semibold text-slate-900">${item.alat.nama}</h3>
              <p class="text-sm text-slate-600">${new Date(item.tanggal).toLocaleDateString()} • ${item.sesi}</p>
              <p class="text-sm text-slate-600">Lokasi: ${item.lokasi} • Paket: ${item.paketNomor}</p>
            </div>
            <button onclick="borrowSchedule(${item.id})" class="mt-3 rounded-xl bg-indigo-600 px-4 py-2 text-white hover:bg-indigo-700">Pinjam</button>
          </div>
        </div>
      `).join('') : '<p class="text-slate-600">Tidak ada jadwal tersedia.</p>';
    }

    function renderRecentHistory(items) {
      recentHistoryContainer.innerHTML = items.length ? items.map(item => `
        <div class="rounded-3xl border border-slate-200 p-4 bg-slate-50">
          <h3 class="font-semibold text-slate-900">${item.alat.nama}</h3>
          <p class="text-sm text-slate-600">Status: ${item.status}</p>
          <p class="text-sm text-slate-600">Tanggal: ${new Date(item.jadwal.tanggal).toLocaleDateString()}</p>
        </div>
      `).join('') : '<p class="text-slate-600">Belum ada riwayat peminjaman.</p>';
    }

    function renderHistoryTable(items) {
      historyTable.innerHTML = `
        <table class="min-w-full text-left text-sm text-slate-700">
          <thead class="border-b border-slate-200 bg-slate-100">
            <tr>
              <th class="px-4 py-3">Alat</th>
              <th class="px-4 py-3">Jadwal</th>
              <th class="px-4 py-3">Status</th>
              <th class="px-4 py-3">Bukti</th>
              <th class="px-4 py-3">Aksi</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr class="border-b border-slate-200 bg-white">
                <td class="px-4 py-3">${item.alat.nama}</td>
                <td class="px-4 py-3">${new Date(item.jadwal.tanggal).toLocaleDateString()}<br>${item.jadwal.sesi}</td>
                <td class="px-4 py-3">${item.status}</td>
                <td class="px-4 py-3">Pinjam: ${item.buktiPinjam || '-'}<br>Kembali: ${item.buktiKembali || '-'}</td>
                <td class="px-4 py-3">${item.status === 'AKTIF' ? `<button onclick="requestReturn(${item.id})" class="rounded-xl bg-emerald-600 px-3 py-2 text-white hover:bg-emerald-700">Kembalikan</button>` : '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function borrowSchedule(jadwalId) {
      const bukti = prompt('Masukkan bukti peminjaman / catatan:');
      if (!bukti) return;
      const response = await fetch('/api/user/borrow', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jadwalId, buktiPinjam: bukti, catatanPinjam: 'Pinjam lewat dashboard user' })
      });
      const result = await response.json();
      if (!response.ok) {
        alert(result.error || 'Gagal meminjam.');
        return;
      }
      alert('Peminjaman berhasil.');
      loadDashboard();
    }

    async function requestReturn(peminjamanId) {
      const bukti = prompt('Masukkan bukti pengembalian / catatan:');
      if (!bukti) return;
      const response = await fetch('/api/user/return', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ peminjamanId, buktiKembali: bukti, catatanKembali: 'Pengembalian melalui dashboard user' })
      });
      const result = await response.json();
      if (!response.ok) {
        alert(result.error || 'Gagal mengembalikan.');
        return;
      }
      alert('Pengembalian berhasil. Silakan tunggu verifikasi admin jika diperlukan.');
      loadDashboard();
    }

    function populateReportOptions(items) {
      reportPeminjaman.innerHTML = items.length ? items.map(item => `
        <option value="${item.id}">${item.alat.nama} - ${new Date(item.jadwal.tanggal).toLocaleDateString()}</option>
      `).join('') : '<option value="">Tidak ada peminjaman aktif</option>';
    }

    reportForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const peminjamanId = reportPeminjaman.value;
      const pesan = reportMessage.value.trim();
      if (!peminjamanId || !pesan) return;
      const response = await fetch('/api/user/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ peminjamanId, pesan })
      });
      const data = await response.json();
      if (!response.ok) {
        reportStatus.textContent = data.error || 'Gagal mengirim laporan.';
        return;
      }
      reportStatus.textContent = 'Laporan berhasil dikirim.';
      reportMessage.value = '';
    });

    loadDashboard();
  </script>
</body>
</html>
